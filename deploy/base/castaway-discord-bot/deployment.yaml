apiVersion: apps/v1
kind: Deployment
metadata:
  name: castaway-discord-bot
  labels:
    app.kubernetes.io/name: castaway-discord-bot
    app.kubernetes.io/part-of: castaway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: castaway-discord-bot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: castaway-discord-bot
        app.kubernetes.io/part-of: castaway
    spec:
      containers:
        - name: castaway-discord-bot
          image: ghcr.io/bry-guy/castaway-discord-bot:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: castaway-discord-bot-config
            - secretRef:
                name: castaway-discord-bot-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

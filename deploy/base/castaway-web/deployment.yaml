apiVersion: apps/v1
kind: Deployment
metadata:
  name: castaway-web
  labels:
    app.kubernetes.io/name: castaway-web
    app.kubernetes.io/part-of: castaway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: castaway-web
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: castaway-web
        app.kubernetes.io/part-of: castaway
    spec:
      containers:
        - name: castaway-web
          image: ghcr.io/bry-guy/castaway-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: castaway-web-config
            - secretRef:
                name: castaway-web-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

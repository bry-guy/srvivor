apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: castaway-postgres
  labels:
    app.kubernetes.io/name: castaway-postgres
    app.kubernetes.io/part-of: castaway
spec:
  serviceName: castaway-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: castaway-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: castaway-postgres
        app.kubernetes.io/part-of: castaway
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: castaway-postgres-secrets
                  key: postgres-superuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: castaway-postgres-secrets
                  key: postgres-superuser-password
            - name: CASTAWAY_WEB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: castaway-postgres-secrets
                  key: castaway-web-db-user
            - name: CASTAWAY_WEB_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: castaway-postgres-secrets
                  key: castaway-web-db-password
            - name: CASTAWAY_DISCORD_BOT_DB_USER
              valueFrom:
                secretKeyRef:
                  name: castaway-postgres-secrets
                  key: castaway-discord-bot-db-user
            - name: CASTAWAY_DISCORD_BOT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: castaway-postgres-secrets
                  key: castaway-discord-bot-db-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d postgres
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d postgres
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: postgres-init
          configMap:
            name: castaway-postgres-init
            defaultMode: 0555
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: castaway-web
  labels:
    app.kubernetes.io/name: castaway-web
    app.kubernetes.io/part-of: castaway
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: castaway-web
                port:
                  name: http

apiVersion: v1
kind: ConfigMap
metadata:
  name: castaway-postgres-init
  labels:
    app.kubernetes.io/part-of: castaway
    app.kubernetes.io/name: castaway-postgres-init
data:
  01-init-castaway-databases.sh: |
    #!/bin/sh
    set -eu

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres <<SQL
      DO
      $$
      BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '${CASTAWAY_WEB_DB_USER}') THEN
          EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${CASTAWAY_WEB_DB_USER}', '${CASTAWAY_WEB_DB_PASSWORD}');
        ELSE
          EXECUTE format('ALTER ROLE %I WITH LOGIN PASSWORD %L', '${CASTAWAY_WEB_DB_USER}', '${CASTAWAY_WEB_DB_PASSWORD}');
        END IF;
      END
      $$;

      DO
      $$
      BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '${CASTAWAY_DISCORD_BOT_DB_USER}') THEN
          EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${CASTAWAY_DISCORD_BOT_DB_USER}', '${CASTAWAY_DISCORD_BOT_DB_PASSWORD}');
        ELSE
          EXECUTE format('ALTER ROLE %I WITH LOGIN PASSWORD %L', '${CASTAWAY_DISCORD_BOT_DB_USER}', '${CASTAWAY_DISCORD_BOT_DB_PASSWORD}');
        END IF;
      END
      $$;
    SQL

    if ! psql --username "$POSTGRES_USER" --dbname postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'castaway_web'" | grep -q 1; then
      createdb --username "$POSTGRES_USER" --owner "$CASTAWAY_WEB_DB_USER" castaway_web
    fi

    if ! psql --username "$POSTGRES_USER" --dbname postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'castaway_discord_bot'" | grep -q 1; then
      createdb --username "$POSTGRES_USER" --owner "$CASTAWAY_DISCORD_BOT_DB_USER" castaway_discord_bot
    fi

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres <<SQL
      GRANT ALL PRIVILEGES ON DATABASE castaway_web TO ${CASTAWAY_WEB_DB_USER};
      GRANT ALL PRIVILEGES ON DATABASE castaway_discord_bot TO ${CASTAWAY_DISCORD_BOT_DB_USER};
    SQL

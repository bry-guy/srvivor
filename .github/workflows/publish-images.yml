name: Publish Images

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/castaway-web/**'
      - 'apps/castaway-discord-bot/**'
      - '.github/workflows/publish-images.yml'
      - 'script/update-home-k3s-digests.py'
  workflow_dispatch:
    inputs:
      castaway_web:
        description: Build, publish, and deploy castaway-web
        required: false
        type: boolean
        default: false
      castaway_discord_bot:
        description: Build, publish, and deploy castaway-discord-bot
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      castaway_web: ${{ steps.changes.outputs.castaway_web }}
      castaway_discord_bot: ${{ steps.changes.outputs.castaway_discord_bot }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
      - id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            castaway_web:
              - 'apps/castaway-web/**'
            castaway_discord_bot:
              - 'apps/castaway-discord-bot/**'
      - id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_CASTAWAY_WEB: ${{ steps.filter.outputs.castaway_web }}
          PUSH_CASTAWAY_DISCORD_BOT: ${{ steps.filter.outputs.castaway_discord_bot }}
          MANUAL_CASTAWAY_WEB: ${{ inputs.castaway_web }}
          MANUAL_CASTAWAY_DISCORD_BOT: ${{ inputs.castaway_discord_bot }}
        run: |
          castaway_web="${PUSH_CASTAWAY_WEB:-false}"
          castaway_discord_bot="${PUSH_CASTAWAY_DISCORD_BOT:-false}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            castaway_web="${MANUAL_CASTAWAY_WEB:-false}"
            castaway_discord_bot="${MANUAL_CASTAWAY_DISCORD_BOT:-false}"
          fi

          echo "castaway_web=$castaway_web" >> "$GITHUB_OUTPUT"
          echo "castaway_discord_bot=$castaway_discord_bot" >> "$GITHUB_OUTPUT"

  build-castaway-web:
    needs: changes
    if: needs.changes.outputs.castaway_web == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - id: build-date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/castaway-web
          tags: |
            type=raw,value=sha-${{ github.sha }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/castaway-web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=sha-${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.value }}

  build-castaway-discord-bot:
    needs: changes
    if: needs.changes.outputs.castaway_discord_bot == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - id: build-date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/castaway-discord-bot
          tags: |
            type=raw,value=sha-${{ github.sha }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/castaway-discord-bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=sha-${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.value }}

  update-home-k3s:
    needs:
      - changes
      - build-castaway-web
      - build-castaway-discord-bot
    if: always() && (needs.changes.outputs.castaway_web == 'true' || needs.changes.outputs.castaway_discord_bot == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update castaway-web digest
        if: needs.changes.outputs.castaway_web == 'true'
        run: |
          python3 script/update-home-k3s-digests.py ghcr.io/${{ github.repository_owner }}/castaway-web ${{ needs.build-castaway-web.outputs.digest }}
      - name: Update castaway-discord-bot digest
        if: needs.changes.outputs.castaway_discord_bot == 'true'
        run: |
          python3 script/update-home-k3s-digests.py ghcr.io/${{ github.repository_owner }}/castaway-discord-bot ${{ needs.build-castaway-discord-bot.outputs.digest }}
      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Render home-k3s overlay after digest update
        run: kubectl kustomize deploy/environments/home-k3s > /tmp/home-k3s-render.yaml
      - name: Commit digest updates
        run: |
          if git diff --quiet -- deploy/environments/home-k3s/kustomization.yaml; then
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add deploy/environments/home-k3s/kustomization.yaml
          git commit -m "chore(deploy): update home-k3s image digests [skip ci]"
          git push

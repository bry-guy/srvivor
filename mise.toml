experimental_monorepo_root = true

[env]
MISE_EXPERIMENTAL = 1

[tools]
go = "1.24"
golangci-lint = '1.64.5'
golangci-lint-langserver = '0.0.10'
sqlc = '1.30.0'
hurl = 'latest'
fnox = '1.15.1'
kubectl = 'latest'

[tasks.ci]
description = "Run all monorepo CI tasks"
run = "mise run //apps/cli:ci && mise run //apps/castaway-web:ci && mise run //apps/castaway-discord-bot:ci"

[tasks.start]
description = "Start the local Castaway stack (db, web, discord bot)"
run = "fnox check -P castaway-discord-bot && fnox exec -P castaway-discord-bot -- docker compose up -d --build castawaydb castaway-web castaway-discord-bot"

[tasks.stop]
description = "Stop the local Castaway stack"
run = "docker compose down"

[tasks.bot]
description = "Start or rebuild only the Discord bot service"
run = "fnox check -P castaway-discord-bot && fnox exec -P castaway-discord-bot -- docker compose up -d --build --no-deps castaway-discord-bot"

[tasks.ps]
description = "Show compose services"
run = "docker compose ps"

[tasks.logs]
description = "Tail compose logs"
run = "docker compose logs -f castaway-web castawaydb castaway-discord-bot"

[tasks.bot-logs]
description = "Tail discord bot logs"
run = "docker compose logs -f castaway-discord-bot"

[tasks.db-shell]
description = "Open psql shell to castawaydb"
run = "docker compose exec castawaydb psql -U castaway -d castaway"

[tasks.db-reset]
description = "Reset castaway database volume and restart the full local stack"
run = "docker compose down -v && fnox check -P castaway-discord-bot && fnox exec -P castaway-discord-bot -- docker compose up -d --build castawaydb castaway-web castaway-discord-bot"

[tasks.seed]
description = "Seed castawaydb with historical seasons"
run = "mise run //apps/castaway-web:seed"

[tasks.openapi]
description = "Generate OpenAPI from TypeSpec"
run = "mise run //apps/castaway-web:openapi"

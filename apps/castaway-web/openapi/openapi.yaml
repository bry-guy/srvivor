components:
  schemas:
    Activity:
      type: object
      required:
        - id
        - instance_id
        - activity_type
        - name
        - status
        - starts_at
        - metadata
        - created_at
        - updated_at
      properties:
        id:
          type: string
        instance_id:
          type: string
        activity_type:
          type: string
        name:
          type: string
        status:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: {}
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ActivityGroupAssignment:
      type: object
      required:
        - id
        - activity_id
        - participant_group_id
        - participant_group_name
        - role
        - starts_at
        - configuration
        - created_at
      properties:
        id:
          type: integer
          format: int64
        activity_id:
          type: string
        participant_group_id:
          type: string
        participant_group_name:
          type: string
        role:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        configuration:
          type: object
          additionalProperties: {}
        created_at:
          type: string
          format: date-time
    ActivityParticipantAssignment:
      type: object
      required:
        - id
        - activity_id
        - participant_id
        - participant_name
        - role
        - starts_at
        - configuration
        - created_at
      properties:
        id:
          type: integer
          format: int64
        activity_id:
          type: string
        participant_id:
          type: string
        participant_name:
          type: string
        participant_group_id:
          type: string
        participant_group_name:
          type: string
        role:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        configuration:
          type: object
          additionalProperties: {}
        created_at:
          type: string
          format: date-time
    AddStirThePotContributionRequest:
      type: object
      required:
        - points
      properties:
        participant_id:
          type: string
        points:
          type: integer
          format: int32
    BonusLedgerEntry:
      type: object
      required:
        - id
        - activity_id
        - activity_type
        - activity_name
        - activity_occurrence_id
        - occurrence_type
        - occurrence_name
        - entry_kind
        - points
        - visibility
        - reason
        - effective_at
        - created_at
      properties:
        id:
          type: string
        activity_id:
          type: string

[env]
FNOX_PROFILE = "castaway-discord-bot"
CASTAWAY_API_BASE_URL = "http://localhost:8080"
BOT_STATE_PATH = "./data/state.db"
LOG_LEVEL = "INFO"

[tasks.lint]
run = "golangci-lint run"

[tasks.test]
depends = [":lint"]
run = "go test -v ./..."

[tasks.build]
run = "go build -ldflags \"-X github.com/bry-guy/srvivor/apps/castaway-discord-bot/internal/buildinfo.Version=${VERSION:-dev} -X github.com/bry-guy/srvivor/apps/castaway-discord-bot/internal/buildinfo.Commit=${GIT_COMMIT:-unknown} -X github.com/bry-guy/srvivor/apps/castaway-discord-bot/internal/buildinfo.BuildDate=${BUILD_DATE:-unknown}\" -o bin/castaway-discord-bot ./cmd/bot"

[tasks.run]
run = "fnox check && fnox exec -- go run ./cmd/bot"

[tasks.check-config]
run = "fnox check && fnox exec -- go run ./cmd/bot --check-config"

[tasks.ci]
description = "Run all tasks for CI pipeline (lint, test, build)"
depends = [":lint", ":test", ":build"]

services:
  castawaydb:
    image: postgres:16
    container_name: castawaydb
    environment:
      POSTGRES_DB: castaway
      POSTGRES_USER: castaway
      POSTGRES_PASSWORD: castaway
    ports:
      - "5432:5432"
    volumes:
      - castawaydb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castaway -d castaway"]
      interval: 5s
      timeout: 5s
      retries: 10

  castaway-web:
    container_name: castaway-web
    build:
      context: ./apps/castaway-web
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://castaway:castaway@castawaydb:5432/castaway?sslmode=disable
      PORT: "8080"
      AUTO_MIGRATE: "true"
      MIGRATIONS_DIR: /app/db/migrations
    ports:
      - "8080:8080"
    depends_on:
      castawaydb:
        condition: service_healthy

  castaway-discord-bot:
    container_name: castaway-discord-bot
    build:
      context: ./apps/castaway-discord-bot
      dockerfile: Dockerfile
    environment:
      CASTAWAY_DISCORD_BOT_TOKEN:
      CASTAWAY_DISCORD_APPLICATION_ID:
      DISCORD_PODRACING_SERVER_ID:
      CASTAWAY_DISCORD_PUBLIC_KEY:
      CASTAWAY_API_BASE_URL: ${CASTAWAY_API_BASE_URL:-http://castaway-web:8080}
      BOT_STATE_PATH: ${BOT_STATE_PATH:-/app/data/state.db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - castaway-discord-bot-data:/app/data
    depends_on:
      castaway-web:
        condition: service_started

volumes:
  castawaydb-data:
  castaway-discord-bot-data:
